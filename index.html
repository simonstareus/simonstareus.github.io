<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Simon Stareus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <h1 class="site-logo">
      <a href="index.html">
        <img src="images/logo.png" alt="Simon Stareus logo">
      </a>
    </h1>
  </header>

  <main class="posts-container">
    <article class="post">
      <img src="images/post-1.jpg" alt="First post image">
      <div class="post-text">
        <h2>First post title</h2>
        <p>
          Write your text here. This block can contain an image and text,
          similar to the centered content feeling on the Sundance site.
        </p>
      </div>
    </article>

    <article class="post">
      <img src="images/post-2.jpg" alt="Second post image">
      <div class="post-text">
        <h2>Second post title</h2>
        <p>
          Add another post here. You can duplicate this whole article block
          whenever you want a new entry.
        </p>
      </div>
    </article>
  </main>

</body>
</html>
